name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [fmt, vet]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: ${{ matrix.check == 'vet' }}
      - name: Run go fmt
        if: matrix.check == 'fmt'
        run: |
          diff="$(gofmt -d .)"
          if [ -n "$diff" ]; then
            echo "$diff"
            exit 1
          fi
      - name: Run go vet
        if: matrix.check == 'vet'
        run: go vet ./...
  test:
    runs-on: ubuntu-latest
    services:
      emulator:
        image: gcr.io/cloud-spanner-emulator/emulator
        ports:
          - 9010:9010
          - 9020:9020
    env:
      SPANNER_EMULATOR_HOST: localhost:9010
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            compattest/go.sum
      - name: Run unit tests
        run: go test ./... -v
      - name: Run compatibility tests
        run: cd compattest && go test ./... -v
